name: Scrape GoFundMe Donations

on:
  workflow_dispatch:
    inputs:
      fundraiser_url:
        description: "GoFundMe Pro fundraiser URL"
        required: false
        default: "https://pro.gofundme.com/fundraiser/6498356"
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Scrape GoFundMe
        env:
          FUNDRAISER_URL: ${{ github.event.inputs.fundraiser_url || 'https://pro.gofundme.com/fundraiser/6498356' }}
        run: npm run scrape:gofundme

      - name: Upload scrape artifact
        uses: actions/upload-artifact@v4
        with:
          name: gofundme-donations
          path: data/donations.from-gofundme.json

      - name: Commit updated scrape output
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh GoFundMe donation snapshot"
          file_pattern: data/donations.from-gofundme.json
