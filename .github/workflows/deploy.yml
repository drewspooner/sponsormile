name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Sync donations and redeploy every 12 hours (8 AM and 8 PM ET)
    - cron: "0 0,12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync donations cache
        run: node scripts/sync-donations.mjs
        env:
          NEXT_PUBLIC_FUNRAISE_PAGE_ID: ${{ vars.NEXT_PUBLIC_FUNRAISE_PAGE_ID }}
          NEXT_PUBLIC_FUNRAISE_PLATFORM_URL: ${{ vars.NEXT_PUBLIC_FUNRAISE_PLATFORM_URL }}

      - name: Commit updated donations cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/donations.json
          git diff --staged --quiet || git commit -m "chore: sync donations cache [skip ci]"
          git push

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FUNRAISE_CAMPAIGN_URL: ${{ vars.NEXT_PUBLIC_FUNRAISE_CAMPAIGN_URL }}
          NEXT_PUBLIC_FUNRAISE_PAGE_ID: ${{ vars.NEXT_PUBLIC_FUNRAISE_PAGE_ID }}
          NEXT_PUBLIC_FUNRAISE_PLATFORM_URL: ${{ vars.NEXT_PUBLIC_FUNRAISE_PLATFORM_URL }}
          NEXT_PUBLIC_FUNRAISE_AWARE_SCRIPT_URL: ${{ vars.NEXT_PUBLIC_FUNRAISE_AWARE_SCRIPT_URL }}
          NEXT_PUBLIC_FUNRAISE_FORM_ID: ${{ vars.NEXT_PUBLIC_FUNRAISE_FORM_ID }}
          NEXT_PUBLIC_ENABLE_MAP: ${{ vars.NEXT_PUBLIC_ENABLE_MAP }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
